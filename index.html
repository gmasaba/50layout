<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Layout Patterns Generator & Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --primary-color: #323c4b;
            --border-color: #cbd5e1;
            --grid-size: 60px;
            --mini-grid-size: 25px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Main Page View --- */
        #mainView { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        header { text-align: center; margin-bottom: 40px; }
        .upload-zone {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 650px; 
            margin: 0 auto 30px auto;
            text-align: center;
            border: 2px dashed var(--border-color);
        }
        .upload-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .patterns-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .pattern-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pattern-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .pattern-header { padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .pattern-title { margin: 0; font-size: 1.1rem; color: var(--primary-color); }
        .pattern-preview {
            background: #eeeeee;
            height: 240px;
            display: grid;
            grid-template-columns: repeat(6, var(--grid-size));
            grid-template-rows: repeat(4, var(--grid-size));
            justify-content: center;
            align-content: center;
            overflow: hidden;
            position: relative;
        }
        .tile {
            width: var(--grid-size);
            height: var(--grid-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #1e293b;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            outline: 1px solid rgba(0,0,0,0.1);
        }
        .pattern-info { padding: 20px; font-size: 0.9rem; line-height: 1.5; flex-grow: 1; background: #ffffff; }

        /* --- Transformation Classes --- */
        .n { transform: none; }
        .r90 { transform: rotate(90deg); }
        .r180 { transform: rotate(180deg); }
        .r270 { transform: rotate(270deg); }
        .mx { transform: scaleX(-1); }
        .my { transform: scaleY(-1); }
        .mxy { transform: scale(-1); }
        .mx90 { transform: scaleX(-1) rotate(90deg); }
        .my90 { transform: scaleY(-1) rotate(90deg); }

        /* --- Editor View --- */
        #editorView {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffffff;
            z-index: 1000;
        }
        .editor-container { display: flex; width: 100%; height: 100%; }
        
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            position: relative;
            height: 100%;
            overflow: hidden;
        }
        .workspace-header {
            background: #ffffff;
            padding: 10px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            gap: 15px;
        }
        
        .btn-outline {
            background: transparent; border: 1px solid #cbd5e1; padding: 8px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--text-color); transition: all 0.15s ease;
        }
        .btn-outline:hover { background: #f1f5f9; border-color: #94a3b8; }
        .btn-outline.active-toggle { background: #e2e8f0; border-color: var(--primary-color); color: #0284c7; }
        .btn-outline svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        .preview-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f1f5f9;
            touch-action: none;
        }
        .tessellation-output {
            transform-origin: center center;
            display: block;
            background: #e2e8f0;
        }

        .btn-reset-zoom-floating {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Tools Panel */
        .tools-panel {
            width: 480px;
            min-width: 480px;
            background: #ffffff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            transition: transform 0.3s ease;
        }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
        .desktop-tab-toggle { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .desktop-tab-btn { flex: 1; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-weight: 600; color: #64748b; }
        .desktop-tab-btn.active { background: #ffffff; border-color: var(--primary-color); color: var(--primary-color); }

        .tool-group { margin-bottom: 20px; display: none; }
        .tool-group.active-tab { display: block; }
        .tool-group h4 { margin-top: 0; margin-bottom: 15px; color: var(--primary-color); }
        .tool-row { display: flex; gap: 10px; margin-bottom: 36px; align-items: center; }
        .tool-row label { font-size: 0.85rem; width: 100px; color: #64748b; flex-shrink: 0; }
        .tool-row input[type="range"] { flex: 1; }
        .num-input { width: 60px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.95rem; width: 100%; background: #ffffff; }

        .chain-linker-row {
            display: flex; justify-content: flex-end; margin-top: -30px; margin-bottom: 8px; padding-right: 20px;
        }
        .btn-chain-lock {
            background: transparent; border: none; width: 28px; height: 28px; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b !important; transition: all 0.15s;
        }
        .btn-chain-lock:hover { background: #e2e8f0; color: #1e293b; }
        .btn-chain-lock.active { background: transparent; border: none; color: #0369a1 !important; }
        .btn-chain-lock svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* Studio Panel Layout Grid */
        .studio-layout-container {
            display: grid;
            grid-template-columns: 80px 1fr 120px;
            gap: 15px;
            align-items: center;
            margin-top: 15px;
        }
        .studio-left-col { display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .studio-center-col { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .studio-right-col { display: flex; flex-direction: column; gap: 12px; font-size: 0.8rem; color: #64748b; justify-content: center; }

        .canvas-container {
            position: relative; width: 230px; height: 230px; 
            border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; background: #fff;
        }
        #tileCanvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; aspect-ratio: 1/1; }

        /* Outline Grid Icons 3x2 */
        .tools-grid-3x2 {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
        }
        .tool-btn-outline {
            height: 36px; background: transparent; border: 1px solid #cbd5e1; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: #475569;
        }
        .tool-btn-outline:hover, .tool-btn-outline.active { border-color: var(--text-color); background: #f1f5f9; color: #0f172a; }
        .tool-btn-outline svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Line Size Horizontal */
        .line-size-horiz { display: flex; gap: 4px; width: 100%; margin-top: 5px; }
        .line-dot-opt { flex: 1; height: 28px; border: 1px solid #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .line-dot-opt.active { background: #1e293b; border-color: #1e293b; }
        .line-dot-opt.active .dot-shape { background: #fff; }
        .dot-shape { background: #475569; border-radius: 50%; }

        /* Color Controls with Checkboxes */
        .color-picker-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .color-picker-circle-row { display: flex; align-items: center; gap: 6px; }
        .circle-color-picker {
            -webkit-appearance: none; border: 1px solid #cbd5e1; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; background: none; overflow: hidden; padding: 0;
        }
        .circle-color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .circle-color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }
        
        /* Checkbox Styles */
        .color-checkbox {
            cursor: pointer; width: 16px; height: 16px; accent-color: var(--text-color); margin: 0;
        }
        
        .color-name-text { display: inline-block; }

        .canvas-actions-row { display: flex; justify-content: center; gap: 6px; width: 100%; margin-top: 12px; }

        .mini-preview-box { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        .mini-preview-grid { display: grid; grid-template-columns: repeat(6, var(--mini-grid-size)); grid-template-rows: repeat(4, var(--mini-grid-size)); background: #e2e8f0; }
        .mini-tile { width: var(--mini-grid-size); height: var(--mini-grid-size); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; color: #323c4b; background: #ffffff; outline: 1px solid rgba(0,0,0,0.1); }

        .mobile-nav-bar { display: none; }
        
        #headerLayoutSelectWrapper { display: flex; flex: 1; justify-content: center; padding: 0 10px; }

        /* --- Crop Modal Layout Optimized (Desktop Focus) --- */
        #cropModal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center;
        }
        .crop-box { 
            background: white; padding: 30px; border-radius: 16px; 
            max-width: 1400px; width: 95%; text-align: center; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .crop-close-btn {
            position: absolute; top: 15px; right: 15px; background: transparent; border: none;
            cursor: pointer; color: #64748b; padding: 5px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.15s;
        }
        .crop-close-btn:hover { background: #f1f5f9; color: #1e293b; }
        .crop-close-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
        
        .crop-preview-container { 
            height: 800px; max-height: 80vh; margin: 20px 0; background: #f8fafc; 
            position: relative; overflow: hidden; border-radius: 8px; border: 1px solid #e2e8f0;
        }
        #cropImageTag { max-width: 100%; display: block; }

        /* ==========================================================================
           --- MOBILE & TABLET RESPONSIVE STYLE (max-width: 991px) ---
           ========================================================================= */
        @media (max-width: 991px) {
            body { overflow: hidden; position: fixed; width: 100%; height: 100%; }
            #mainView { height: 100vh; }
            .patterns-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

            .editor-container { flex-direction: column; height: 100vh; width: 100vw; }
            
            .workspace { height: calc(100% - 60px); flex: 1; width: 100%; padding-bottom: 250px; }
            .workspace-header { padding: 8px 12px; gap: 8px; }
            .workspace-header span { display: none; }
            
            #headerLayoutSelectWrapper { display: flex !important; visibility: visible !important; width: auto; max-width: 55%; }
            #headerLayoutSelectWrapper select { height: 36px; padding: 4px 8px; font-size: 0.85rem; border-radius: 6px; }

            /* Bottom Panel System */
            .tools-panel {
                width: 100% !important; min-width: 100% !important;
                height: auto !important; max-height: 290px;
                border-left: none; border-top: 1px solid #e2e8f0;
                position: fixed; bottom: 60px; left: 0; z-index: 1001;
                background: #ffffff; transform: translateY(0); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .tools-panel.collapsed { transform: translateY(100%) !important; }

            .panel-content { padding: 8px 14px; overflow-y: auto; height: 100%; }
            
            #editPatternTitle, #editPatternDesc, .mini-preview-box, .desktop-tab-toggle, .tool-group h4, .tools-panel hr, #desktopPanelRulesZone { display: none !important; }
            .chain-linker-row { display: flex !important; justify-content: flex-end; margin-top: -15px; margin-bottom: 4px; width: 100%; }
            .chain-linker-row .btn-chain-lock { width: 20px !important; height: 20px !important; }
            .chain-linker-row .btn-chain-lock svg { width: 16px !important; height: 16px !important; }


            .tool-group { margin-bottom: 0; padding: 4px 0; }
            .tool-group.active-tab { display: block !important; }

            #tabGridExpansion { padding: 4px 5px; }
            .tool-group .tool-row { margin-bottom: 18px; }

            .studio-layout-container {
                grid-template-columns: 55px 1fr 65px; gap: 8px; margin-top: 2px; width: 100%; align-items: center; justify-content: center;
            }
            
            .studio-center-col { display: flex; justify-content: center; align-items: center; width: 100%; }
            .canvas-container { width: 140px; height: 140px; border-radius: 6px; margin: 0 auto; }
            
            .tools-grid-3x2 { gap: 4px; }
            .tool-btn-outline { height: 28px; padding: 2px; }
            .tool-btn-outline svg { width: 14px; height: 14px; }
            .line-size-horiz { margin-top: 3px; gap: 2px; }
            .line-dot-opt { height: 18px; }
            
            .studio-right-col { gap: 4px; font-size: 0.7rem; justify-content: center; }
            .color-picker-wrapper { gap: 1px; }
            .circle-color-picker { width: 20px; height: 20px; }
            .color-checkbox { width: 13px; height: 13px; }
            
            .canvas-actions-row { margin-top: 6px; gap: 4px; }
            .canvas-actions-row .btn-outline { padding: 4px; height: 28px; flex: 1; }
            .canvas-actions-row .btn-outline svg { width: 14px; height: 14px; }

            /* แถบนำทางด้านล่าง */
            .mobile-nav-bar {
                display: flex; position: fixed; bottom: 0; left: 0; width: 100vw; height: 60px;
                background: #f8fafc; border-top: 1px solid #e2e8f0; z-index: 1002;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .nav-tab-item {
                flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
                background: transparent; border: none; cursor: pointer; color: #64748b; font-size: 0.75rem; font-weight: 500; gap: 2px;
            }
            .nav-tab-item svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
            .nav-tab-item.active { color: var(--text-color); background: #ffffff; font-weight: 600; }

            /* Crop Box Mobile override */
            .crop-box { padding: 15px; }
            .crop-preview-container { height: 300px; margin: 10px 0; }
        }
    </style>
</head>
<body>

<div id="mainView">
    <header>
        <h1>Layout Patterns 50 Principles</h1>
    </header>

   <div class="upload-zone">
        <small style="color: #64748b; font-size: 0.95rem;">Click Layout Card to Enter Edit Mode</small>
        <div class="upload-actions">
            <button class="btn-outline" id="btnClearToP" style="font-size: 0.85rem; padding: 6px 12px;">Reset Image to Default</button>
        </div>
    </div>

    <div class="patterns-container" id="patternsWrapper"></div>
</div>

<div id="editorView">
    <div class="editor-container">
        
        <div class="workspace">
            <div class="workspace-header">
                <button class="btn-outline" id="btnBack" title="Back to Main">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>

                <div id="headerLayoutSelectWrapper">
                    <select id="layoutSelect"></select>
                </div>

                <button class="btn-outline" id="btnSaveImage" title="Save Pattern Image" style="color: #2563eb;">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                </button>
            </div>
            
            <div class="preview-area" id="previewArea">
                <button class="btn-outline btn-reset-zoom-floating" id="btnResetZoom" title="Reset View Zoom/Pan">
                    <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
                <canvas class="tessellation-output" id="tessellationOutput"></canvas>
            </div>
        </div>

        <div class="tools-panel" id="toolsPanel">
            <div class="panel-content">
                <div style="margin-bottom: 15px;" id="desktopPanelRulesZone">
                    <label style="font-size:0.85rem; font-weight:600; color:var(--primary-color); display:block; margin-bottom:6px;">Layout Rules</label>
                    <div id="desktopSelectAnchor"></div>
                </div>

                <h3 id="editPatternTitle" style="color:var(--primary-color); margin-top:0; margin-bottom: 4px; display:none;">Layout Configuration</h3>
                <p id="editPatternDesc" style="font-size:0.85rem; color:#64748b; margin-bottom: 10px;"></p>
                
                <div class="mini-preview-box">
                    <div class="mini-preview-grid" id="miniPreviewGrid"></div>
                </div>

                <div class="desktop-tab-toggle">
                    <button class="desktop-tab-btn active" data-target="tabGridExpansion">Grid Expansion</button>
                    <button class="desktop-tab-btn" data-target="tabTileStudio">Tile Studio</button>
                </div>

                <div class="tool-group active-tab" id="tabGridExpansion">
                    <h4>Grid Expansion Setting</h4>
                    
                    <div class="tool-row">
                        <label>Columns</label>
                        <input type="range" id="gridCols" value="8" min="1" max="30">
                        <input type="number" id="gridColsNum" class="num-input" value="8" min="1" max="30">
                    </div>
                    
                    <div class="chain-linker-row">
                        <button class="btn-chain-lock active" id="btnChainLock" title="Link Columns & Rows Ratio">
                            <svg viewBox="0 0 24 24">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="tool-row">
                        <label>Rows</label>
                        <input type="range" id="gridRows" value="6" min="1" max="30">
                        <input type="number" id="gridRowsNum" class="num-input" value="6" min="1" max="30">
                    </div>

                    <div class="tool-row">
                        <label>Block Size (px)</label>
                        <input type="range" id="gridSizeInput" value="80" min="20" max="200">
                        <input type="number" id="gridSizeNum" class="num-input" value="80" min="20" max="200">
                    </div>
                </div>

                <div class="tool-group" id="tabTileStudio">
                    <div class="tool-row" style="margin-bottom:8px;">
                        <input type="file" id="tileImageUpload" accept="image/*" style="font-size: 0.8rem; width:100%;">
                    </div>
                    
                    <div class="studio-layout-container">
                        
                        <div class="studio-left-col">
                            <div class="tools-grid-3x2" id="toolsGrid">
                                <button class="tool-btn-outline active" data-tool="brush" title="Pencil Free Brush">
                                    <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                                </button>
                                <button class="tool-btn-outline" data-tool="line" title="Straight Vector Line">
                                    <svg viewBox="0 0 24 24"><path d="M5 19L19 5M5 5h.01M19 19h.01"/></svg>
                                </button>
                                <button class="tool-btn-outline" data-tool="rect" title="Rectangle Shape">
                                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                                </button>
                                <button class="tool-btn-outline" data-tool="circle" title="Perfect Circle Shape">
                                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
                                </button>
                                <button class="tool-btn-outline" data-tool="triangle" title="Triangle Mesh">
                                    <svg viewBox="0 0 24 24"><path d="M12 3L2 20h20L12 3z"/></svg>
                                </button>
                                <button class="tool-btn-outline" id="btnBucketTool" data-tool="fill" title="Flood Paint Fill Bucket">
                                    <svg viewBox="0 0 24 24"><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"/></svg>
                                </button>
                            </div>

                            <div class="line-size-horiz" id="dotSizeContainer">
                                <div class="line-dot-opt" data-value="2" title="Thin"><div class="dot-shape" style="width:3px; height:3px;"></div></div>
                                <div class="line-dot-opt active" data-value="6" title="Med"><div class="dot-shape" style="width:6px; height:6px;"></div></div>
                                <div class="line-dot-opt" data-value="12" title="Thick"><div class="dot-shape" style="width:10px; height:10px;"></div></div>
                            </div>
                        </div>

                        <div class="studio-center-col">
                            <div class="canvas-container">
                                <canvas id="tileCanvas" width="240" height="240"></canvas>
                            </div>
                        </div>
